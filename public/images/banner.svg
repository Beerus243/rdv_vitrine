<svg xmlns="http://www.w3.org/2000/svg" width="1920" height="720" viewBox="0 0 1920 720" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="45%" style="stop-color:#4a1942"/>
      <stop offset="100%" style="stop-color:#e8357a"/>
    </linearGradient>
    <radialGradient id="glow" cx="75%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:#ff6b9d;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#e8357a;stop-opacity:0"/>
    </radialGradient>
    <linearGradient id="fade" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0f0f1a;stop-opacity:0.92"/>
      <stop offset="55%" style="stop-color:#1a1a2e;stop-opacity:0.55"/>
      <stop offset="100%" style="stop-color:#e8357a;stop-opacity:0.15"/>
    </linearGradient>
  </defs>
  <rect width="1920" height="720" fill="url(#sky)"/>
  <rect width="1920" height="720" fill="url(#glow)"/>
  <rect width="1920" height="720" fill="url(#fade)"/>
  <!-- decorative circles -->
  <circle cx="1650" cy="120" r="180" fill="#e8357a" opacity="0.12"/>
  <circle cx="1500" cy="520" r="240" fill="#ff6b9d" opacity="0.08"/>
  <circle cx="200" cy="600" r="120" fill="#fde8f1" opacity="0.06"/>
  <!-- subtle grid -->
  <g opacity="0.04" stroke="#ffffff" stroke-width="1">
    <line x1="0" y1="180" x2="1920" y2="180"/>
    <line x1="0" y1="360" x2="1920" y2="360"/>
    <line x1="0" y1="540" x2="1920" y2="540"/>
    <line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
    <line x1="1440" y1="0" x2="1440" y2="720"/>
  </g>
</svg>
